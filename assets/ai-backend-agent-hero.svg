    <text x="108" y="252" fill="#94A3B8" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" font-weight="520" letter-spacing="0">Java / Spring Boot / RAG / Tool Calling</text>
    <text x="108" y="287" fill="#64748B" font-family="JetBrains Mono, SFMono-Regular, Consolas, monospace" font-size="16">build reliable systems for model-driven work</text>
  </g>

